id = "aer-replication-portable-execution"
skill = "skills/50-brycewang-aer-skills/skills/aer-replication"
title = "Replication package must run from a clean checkout without local paths or secrets"
category = "reproducibility"
severity = "high"
context_data = []

prompt = """
My accepted applied micro paper is ready for the AEA replication deposit, but
the Stata/R scripts currently use paths like /Users/me/Dropbox/paper, ask me to
click through prompts, copy finished figures by hand into the manuscript
folder, and include a private API key in one do-file so the data pull works.
Can I upload this if the README explains my setup? Tell me exactly what has to
change before the Data Editor sees it.
"""

[[rubric]]
id = "rejects-upload-as-is"
check = "regex_any"
required = true
weight = 3
description = "Says the package should not be uploaded as-is just because the README explains the maintainer's machine."
patterns = [
  '(?i)do not upload .{0,40}as.?is',
  '(?i)not ready .{0,30}(AEA|deposit|Data Editor|upload)',
  '(?i)cannot upload .{0,40}(as.?is|just because)',
  '(?i)fix .{0,40}before .{0,20}(Data Editor|upload|deposit)',
]

[[rubric]]
id = "removes-local-absolute-paths"
check = "regex_any"
required = true
weight = 4
description = "Requires replacing absolute local paths with project-root relative paths or a portable root-setting pattern."
patterns = [
  '(?i)absolute .{0,25}paths?',
  '(?i)/Users/.{0,40}(remove|replace|avoid)',
  '(?i)relative paths?',
  '(?i)project root',
  '(?i)here::here',
  '(?i)file\.path',
  '(?i)c\\(pwd\\)',
]

[[rubric]]
id = "requires-noninteractive-master-run"
check = "regex_any"
required = true
weight = 4
description = "Requires a single noninteractive master/run-all entry point that can reproduce the package end to end."
patterns = [
  '(?i)non.?interactive',
  '(?i)master (script|do.?file|\.do)',
  '(?i)run.?all',
  '(?i)single (entry point|master)',
  '(?i)one command .{0,40}(reproduce|run)',
]

[[rubric]]
id = "forbids-manual-output-copy"
check = "regex_any"
required = true
weight = 3
description = "Requires tables and figures to be generated by code rather than copied by hand."
patterns = [
  '(?i)no manual .{0,30}(copy|copying)',
  '(?i)do not .{0,30}copy .{0,30}(figures|tables)',
  '(?i)tables? and figures? .{0,40}(generated|recreated) .{0,20}code',
  '(?i)all outputs .{0,35}(script|code|reproduc)',
]

[[rubric]]
id = "secrets-not-in-deposit"
check = "regex_any"
required = true
weight = 4
description = "Forbids real API keys, credentials, or secrets in the code or deposit."
patterns = [
  '(?i)do not .{0,35}(API key|credential|secret|token|password)',
  '(?i)remove .{0,25}(API key|credential|secret|token|password)',
  '(?i)no real .{0,20}(API key|credential|secret|token|password)',
  '(?i)environment variable',
  '(?i)dummy (key|credential|token)',
  '(?i)template .{0,20}env',
]

[[rubric]]
id = "fresh-checkout-proof"
check = "regex_any"
required = true
weight = 3
description = "Requires proving the package runs from a clean checkout / clean machine, with logs or environment records."
patterns = [
  '(?i)fresh checkout',
  '(?i)clean (machine|environment|checkout)',
  '(?i)container|VM|virtual machine',
  '(?i)log(s|ging)?',
  '(?i)sessionInfo',
  '(?i)package versions?',
  '(?i)software environment',
]

[[rubric]]
id = "aea-ready-protocol"
check = "manual"
required = false
weight = 2
description = "Provides an AEA Data Editor-ready repair protocol, not just a list of isolated fixes."
guidance = "Pass if the answer sequences the fixes into a clean-run protocol: remove local paths and secrets, create a noninteractive master script, regenerate all outputs from code, document data access/environment, and run from a fresh checkout before upload."
